<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1C36">
<title>Квант Майнинг — Засварын систем</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F0F3F8;--bg2:#fff;--bg3:#E8EDF4;
  --text:#1A2332;--text2:#5A6A7E;--text3:#99A6B5;
  --border:#DDE3ED;--border2:#C8D0DE;
  --blue:#1B56C8;--blue2:#1648A8;--blue-lt:#E8F0FE;
  --red:#C92020;--red-bg:#FEE8E8;--red-tx:#8B1515;
  --green:#047A52;--green-bg:#E6F7F1;--green-tx:#035A3C;
  --amber:#B86200;--amber-bg:#FEF3E2;--amber-tx:#8A4900;
  --purple:#5B21B6;--purple-bg:#EDE9FE;--purple-tx:#3B1A8A;
  --navy:#0B1C36;--navy2:#152C50;
  --r:6px;--rm:10px;--rl:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow:hidden;height:100vh}

/* LOGIN */
#ls{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:2000}
.lg{position:absolute;inset:0;opacity:.05;background:repeating-linear-gradient(0deg,#fff 0,#fff 1px,transparent 1px,transparent 36px),repeating-linear-gradient(90deg,#fff 0,#fff 1px,transparent 1px,transparent 36px)}
.lc{background:#fff;border-radius:22px;padding:36px 32px 28px;width:340px;position:relative;z-index:1}
.li{width:56px;height:56px;background:var(--blue);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin:0 auto 10px}
.lco{font-size:16px;font-weight:700;color:var(--navy);text-align:center}
.lcs{font-size:11.5px;color:var(--text2);text-align:center;margin-top:2px;margin-bottom:22px}
.lcl{font-size:13px;font-weight:600;color:var(--text);text-align:center;margin-bottom:16px}
.pds{display:flex;justify-content:center;gap:14px;margin-bottom:20px}
.pd{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .18s}
.pd.on{background:var(--blue);border-color:var(--blue);transform:scale(1.15)}
.pd.er{background:var(--red);border-color:var(--red)}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.pb{height:54px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-size:19px;font-weight:700;color:var(--navy);cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
.pb:hover{background:var(--blue-lt);border-color:var(--blue)}
.pb:active{transform:scale(.92);background:var(--blue);color:#fff}
.pb.gh{border-color:transparent;background:transparent;cursor:default}
.pem{text-align:center;color:var(--red);font-size:12px;margin-top:10px;min-height:17px;font-weight:600}
.phi{text-align:center;color:var(--text3);font-size:11px;margin-top:12px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.shk{animation:shake .38s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .22s ease}

/* APP */
#as{display:none;height:100vh;overflow:hidden}
.al{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:230px;min-width:230px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.sbb{padding:15px 13px 11px;border-bottom:1px solid rgba(255,255,255,.07)}
.sbr{display:flex;align-items:center;gap:9px}
.sbi{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
.sbn{font-size:12.5px;font-weight:700;color:#EEF3FF;line-height:1.25}
.sbs{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}
.bt{margin:10px 10px 0;background:rgba(255,255,255,.07);border-radius:8px;display:flex;padding:3px;gap:2px}
.btb{flex:1;padding:6px 2px;border-radius:6px;font-size:10.5px;font-weight:700;border:none;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.42);background:none;text-align:center}
.btb.on{background:var(--blue);color:#fff}
.sbn2{flex:1;padding:9px 7px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.sbn2::-webkit-scrollbar{width:2px}
.sbn2::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.nsl{font-size:9.5px;color:rgba(255,255,255,.26);padding:9px 9px 3px;letter-spacing:.08em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .12s}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.82)}
.ni.active{background:rgba(27,86,200,.4);color:#82BCFF}
.ni i{font-size:15px;flex-shrink:0}
.nbg{margin-left:auto;background:#C92020;color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:17px;text-align:center}
.sbf{padding:10px;border-top:1px solid rgba(255,255,255,.06)}
.sbu{display:flex;align-items:center;gap:8px}
.sbuav{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sbun{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.72)}
.sbur{font-size:10px;color:rgba(255,255,255,.3)}
.sblg{margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.28);font-size:15px;padding:4px;border-radius:5px}
.sblg:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.08)}

/* MAIN */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tbt{font-size:14px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bp{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;flex-shrink:0}
.bub{background:#DBEAFE;color:#1E3A8A}
.bgb{background:#D1FAE5;color:#065F46}
.ib{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;position:relative;flex-shrink:0}
.ib:hover{background:var(--bg3)}
.nb{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#EF4444;border:2px solid #fff}
.bpri{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.bpri:hover{background:var(--blue2)}
.ct{flex:1;overflow-y:auto;padding:14px 16px}
.ct::-webkit-scrollbar{width:4px}
.ct::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* STATS */
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px}
.sl{font-size:10.5px;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.sv{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.sn{font-size:10.5px;margin-top:3px}
.cr{color:var(--red)}.cb{color:var(--blue)}.ca{color:var(--amber)}.cg{color:var(--green)}.cp{color:var(--purple)}

/* TABLE */
.tw{background:#fff;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px}
.th{display:grid;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.tr{display:grid;padding:10px 12px;align-items:center;border-bottom:1px solid var(--border);font-size:12.5px;cursor:pointer;transition:background .1s}
.tr:last-child{border-bottom:none}
.tr:hover{background:var(--bg3)}
.tr.dr{background:#F0FAF5}.tr.dr:hover{background:#E6F7EE}
.tr.or{background:#FFF6F6}.tr.or:hover{background:#FEF0F0}
.tn{font-weight:700;font-size:12px;color:var(--text)}
.te{font-size:10.5px;color:var(--text2);margin-top:1px}
.dr .tn{color:var(--green-tx);text-decoration:line-through;text-decoration-color:rgba(4,122,82,.4)}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bc{background:var(--red-bg);color:var(--red-tx)}
.bh{background:var(--amber-bg);color:var(--amber-tx)}
.bm{background:var(--blue-lt);color:#1E3A8A}
.bl{background:var(--green-bg);color:var(--green-tx)}
.sb2{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:700}
.sp{background:#FEF9C3;color:#854D0E}
.sg{background:var(--blue-lt);color:#1E3A8A}
.sd{background:var(--green-bg);color:var(--green-tx)}
.so{background:var(--red-bg);color:var(--red-tx)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.act{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:3px 7px;border-radius:5px;font-weight:700}
.act:hover{background:var(--blue-lt)}

/* PANELS */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pn{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:12px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.pt{font-size:12.5px;font-weight:700;color:var(--text)}
.lk{font-size:11.5px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:700}
.er2{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.er2:last-child{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0}
.en{font-size:12px;font-weight:700;color:var(--text)}
.erl{font-size:10.5px;color:var(--text2)}
.et{margin-left:auto;font-size:11px;font-weight:700;color:var(--text2)}
.tl{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.tl:last-child{border-bottom:none}
.tld{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tlt{color:var(--text3);min-width:68px;font-size:10.5px}
.tlm{color:var(--text2);font-size:11.5px}
.tlb{font-weight:700;color:var(--text)}

/* EQUIP */
.eg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.eqc{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.eqc:hover{border-color:var(--blue);transform:translateY(-1px)}
.eqi{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:7px}
.eqn{font-size:12.5px;font-weight:700;color:var(--text)}
.eqid{font-size:10.5px;color:var(--text2);margin-bottom:5px}
.eqbr{font-size:10.5px;color:var(--text3);margin-top:3px}

/* TEAM */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tc{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:12px;display:flex;gap:10px}
.avl{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.tcn{font-size:13px;font-weight:700;color:var(--text)}
.tcr{font-size:11px;color:var(--text2);margin:2px 0 5px}
.tcs{font-size:10.5px;color:var(--text3);margin-bottom:6px}
.tcst{display:flex;gap:12px}
.tsn{font-size:16px;font-weight:700;color:var(--text)}
.tsl{font-size:9.5px;color:var(--text2)}
.prg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:6px}
.prgb{height:100%;border-radius:2px;background:var(--blue)}

/* PARTS */
.par{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.par:last-child{border-bottom:none}

/* REPORTS BAR */
.bw{height:120px;display:flex;align-items:flex-end;gap:6px;padding:4px}
.bc2{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{border-radius:4px 4px 0 0;width:100%}

/* DAILY */
.dtt{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.dt{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--border2);background:#fff;color:var(--text2);cursor:pointer;transition:all .12s}
.dt.on{background:var(--blue-lt);color:var(--blue);border-color:#93C5FD}
.dpl{position:relative;padding-left:18px}
.dpl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border)}
.dpi{position:relative;padding:0 0 12px 14px}
.dpi:last-child{padding-bottom:0}
.dpd{position:absolute;left:-7px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid #fff}
.dpt{font-size:10.5px;color:var(--text3);margin-bottom:1px}
.dpti{font-size:12.5px;font-weight:700;color:var(--text)}
.dpds{font-size:11px;color:var(--text2);margin-top:1px}
.dpe{font-size:10.5px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px}

/* PARTS INVENTORY */
.par-hdr{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 80px;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.par-row{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 80px;padding:10px 12px;align-items:center;border-bottom:1px solid var(--border);font-size:12.5px;transition:background .1s}
.par-row:last-child{border-bottom:none}
.par-row:hover{background:var(--bg3)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.qty-btn:hover{background:var(--bg3);border-color:var(--border2)}
.qty-btn.plus:hover{background:#E6F7F1;border-color:#047A52;color:#047A52}
.qty-btn.minus:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qty-num{font-size:14px;font-weight:700;min-width:24px;text-align:center}

/* SETTINGS */
.stw{max-width:500px}
.sts{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:15px;margin-bottom:10px}
.stt{font-size:13px;font-weight:700;color:var(--text);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.fi2{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12.5px;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.fi2:focus{border-color:var(--blue)}
.fgrp{margin-bottom:10px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.flbl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;font-weight:700}
.bsv{display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer}
.bsv:hover{background:var(--blue2)}
.npw{display:flex;gap:10px;margin-bottom:5px}
.npd{width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);transition:all .18s}
.npd.on{background:var(--blue);border-color:var(--blue)}
.mp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:170px}
.mpb{height:40px;border-radius:9px;border:1px solid var(--border);background:#fff;font-size:14px;font-weight:700;color:var(--navy);cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
.mpb:hover{background:var(--blue-lt);border-color:var(--blue)}
.mpb:active{transform:scale(.92);background:var(--blue);color:#fff}
.pmsg{font-size:11.5px;color:var(--text2);min-height:16px}
.pok{color:var(--green);font-weight:700}
.png{color:var(--red);font-weight:700}

/* FILTER */
.fb{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fc{padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:700;border:1px solid var(--border2);background:#fff;color:var(--text2);cursor:pointer;transition:all .12s}
.fc.on{background:var(--blue-lt);color:var(--blue);border-color:#93C5FD}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.mo.op{display:flex}
.mb{background:#fff;border-radius:16px;width:460px;max-height:90vh;overflow-y:auto;padding:18px;border:1px solid var(--border2)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mt2{font-size:14px;font-weight:700;color:var(--text)}
.bgh{padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:none;font-size:12px;cursor:pointer;color:var(--text2);font-weight:700}
.bgh:hover{background:var(--bg3)}

/* NOTIF */
.np{position:absolute;top:52px;right:10px;width:290px;background:#fff;border:1px solid var(--border2);border-radius:var(--rl);z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.12);display:none}
.np.op{display:block}
.nph{padding:9px 13px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text)}
.npi{display:flex;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.npi:last-child{border-bottom:none}
.npi:hover{background:var(--bg3)}
.npic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.nptt{font-size:12px;font-weight:700;color:var(--text)}
.npds{font-size:10.5px;color:var(--text2);margin-top:1px}
.nptm{font-size:10px;color:var(--text3);margin-top:1px}

/* SEARCH */
.srch{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rm);padding:5px 10px;flex:1;max-width:240px}
.srch input{border:none;outline:none;font-size:12.5px;color:var(--text);background:none;width:100%}
.srch i{color:var(--text3);font-size:13px;flex-shrink:0}

/* QR modal */
.qr-box{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0}
.qr-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;width:140px;height:140px}
.qr-c{border-radius:1px}

/* SIGNATURE */
#sig-canvas{border:1.5px solid var(--border);border-radius:var(--rm);cursor:crosshair;display:block;touch-action:none}

/* PROGRESS RING */
.pring{position:relative;width:44px;height:44px;flex-shrink:0}
.pring svg{transform:rotate(-90deg)}
.pring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:var(--text)}

/* COST BADGE */
.cost-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.cost-row:last-child{border-bottom:none}

/* TO ALERT */
.to-alert{background:var(--amber-bg);border:1px solid #FDE68A;border-radius:var(--rm);padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--amber-tx);font-weight:600}

/* EMPTY */
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:8px}

/* TOAST */

        document.getElementById('as').style.display='block';
        pinBuf=''; upDots(false);
        updBadges(); rPage(curPage);
      } else {
        document.getElementById('perr').textContent='ПИН код буруу байна!';
        for(let i=0;i<4;i++){let e=document.getElementById('pd'+i);e.classList.remove('on');e.classList.add('er');}
        document.getElementById('pdots').classList.add('shk');
        setTimeout(()=>{pinBuf='';upDots(false);document.getElementById('perr').textContent='';document.getElementById('pdots').classList.remove('shk');},650);
      }
    },80);
  }
}

function upDots(e){ for(let i=0;i<4;i++){let el=document.getElementById('pd'+i);el.classList.remove('on','er');if(i<pinBuf.length)el.classList.add(e?'er':'on');} }

// ========== NAV ==========
function goP(page,el){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  else { const b=document.querySelector(`.ni[data-p="${page}"]`); if(b) b.classList.add('active'); }
  const titles={dashboard:'Хяналтын самбар',daily:'Өдрийн ажлын явц',tasks:'Засварын ажлууд',equipment:'Тоног төхөөрөмж',team:'Инженерүүд',parts:'Сэлбэг хэрэгсэл',costs:'Зардлын хяналт',reports:'Тайлан',settings:'ПИН & Тохиргоо'};
  document.getElementById('ptitle').textContent=titles[page]||page;
  curPage=page;
  document.getElementById('notif-panel').classList.remove('op'); notifOpen=false;
  rPage(page);
}
function rPage(p){
  const c=document.getElementById('content');
  c.classList.remove('fi'); void c.offsetWidth; c.classList.add('fi');
  const d2=d();
  if(p==='dashboard') rDash(c,d2);
  else if(p==='daily') rDaily(c,d2);
  else if(p==='tasks') rTasks(c,d2,curFilter);
  else if(p==='equipment') rEquip(c,d2);
  else if(p==='team') rTeam(c,d2);
  else if(p==='parts') rParts(c,d2);
  else if(p==='costs') rCosts(c,d2);
  else if(p==='reports') rReports(c,d2);
  else if(p==='settings') rSettings(c);
}

const PL={critical:'Яаралтай',high:'Өндөр',medium:'Дунд',low:'Бага'};

const SL={pending:'Хүлээж байна',progress:'Явагдаж байна',done:'Дууссан',overdue:'Хоцорсон'};
const SC={pending:'sp',progress:'sg',done:'sd',overdue:'so'};
const EQS={'Ажиллаж байна':'sd','Засварт':'sg','Хоцорсон':'so'};

function fmt(n){ return n>=1000000?(n/1000000).toFixed(1)+'сая':n>=1000?(n/1000).toFixed(0)+'мянга':String(n); }
function fmtFull(n){ return n.toLocaleString()+'₮'; }

function tRow(t){

function tTable(list){

  return`<div class="tw">
    <div class="th" style="grid-template-columns:1.8fr .9fr 1fr 1fr .9fr 70px">

// ===== TO ALERT CHECK =====
function toAlerts(equip){
  const today=new Date('2026-05-25');
  return equip.filter(e=>{
    const nd=new Date(e.next);
    const diff=Math.ceil((nd-today)/(1000*60*60*24));
    return diff<=7 && e.status!=='Хоцорсон';
  });
}

function adjQty(pid, delta){
  const d2=d();
  const p=d2.parts.find(x=>x.id===pid);
  if(!p) return;
  p.qty=Math.max(0, p.qty+delta);
  p.status=p.qty===0?'out':p.qty<=p.min?'low':'ok';
  save();
  const el=document.getElementById('qty-'+pid);
  if(el){
    el.textContent=p.qty;
    el.style.color=p.qty<=0?'var(--red)':p.qty<=p.min?'var(--amber)':'var(--text)';
  }
  updBadges();
  toast(delta>0?`${p.name} +1 нэмэгдлээ (${p.qty} ${p.unit})`:`${p.name} -1 бууллаа (${p.qty} ${p.unit})`);
}

  if(pStep===1){if(newP1.length>=4)return;newP1+=v;updNP(newP1);if(newP1.length===4){setTimeout(()=>{pStep=2;newP2='';updNP('');const m=document.getElementById('pmsg');if(m)m.textContent='Баталгаажуулан дахин оруулна уу';},180);}}

}

  const p=d2.parts.find(x=>x.id===pid);if(!p)return;
  openModal(`<div class="mh"><span class="mt2"><i class="ti ti-package" style="font-size:13px;vertical-align:-1px;margin-right:5px"></i>${p.name}</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12.5px;margin-bottom:14px">
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Код</div><div style="font-weight:700;font-family:monospace">${p.code}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Тоног төхөөрөмж</div><div style="font-weight:700">${p.equip}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Одоогийн нөөц</div><div style="font-size:18px;font-weight:700;color:${p.qty<=0?'var(--red)':p.qty<=p.min?'var(--amber)':'var(--green)'}">${p.qty} ${p.unit}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Нэгж үнэ</div><div style="font-weight:700">${fmtFull(p.price)}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Доод нөөц</div><div style="font-weight:700">${p.min} ${p.unit}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Нийт үнэлгээ</div><div style="font-weight:700">${fmtFull(p.qty*p.price)}</div></div>
  </div>
  <div style="margin-bottom:12px">
    <label style="font-size:10px;color:var(--text3);margin-bottom:4px;display:block">Тоо хэмжээ шинэчлэх</label>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="qty-btn minus" style="width:36px;height:36px" onclick="adjQty('${p.id}',-1);document.getElementById('det-qty').textContent=DB['${curBranch}'].parts.find(x=>x.id==='${p.id}').qty"><i class="ti ti-minus"></i></button>
      <span id="det-qty" style="font-size:20px;font-weight:700;min-width:40px;text-align:center">${p.qty}</span>
      <button class="qty-btn plus" style="width:36px;height:36px" onclick="adjQty('${p.id}',1);document.getElementById('det-qty').textContent=DB['${curBranch}'].parts.find(x=>x.id==='${p.id}').qty"><i class="ti ti-plus"></i></button>
      <span style="font-size:12px;color:var(--text2)">${p.unit}</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border)">
    <button class="bgh" style="color:var(--red);border-color:var(--red)" onclick="deletePart('${p.id}')"><i class="ti ti-trash" style="font-size:12px"></i> Устгах</button>
    <button class="bgh" onclick="closeModal()">Хаах</button>
  </div>`);
}
function deletePart(pid){
  if(!confirm('Энэ сэлбэгийг устгах уу?'))return;
  const d2=d();d2.parts=d2.parts.filter(p=>p.id!==pid);
  save();updBadges();closeModal();rPage(curPage);toast('Сэлбэг устгагдлаа');
}

function openAddCost(){
  const d2=d();
  openModal(`<div class="mh"><span class="mt2"><i class="ti ti-cash" style="font-size:13px;vertical-align:-1px;margin-right:5px"></i>Зардал нэмэх</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div class="fgrp"><label class="flbl">Ажил сонгох</label><select class="fi2" id="ac-task">${d2.tasks.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
  <div class="fgrp"><label class="flbl">Зардлын дүн (₮)</label><input type="number" class="fi2" id="ac-amt" placeholder="0"></div>
  <div class="fgrp"><label class="flbl">Зардлын тайлбар</label><input class="fi2" id="ac-desc" placeholder="Сэлбэг, хөдөлмөр гэх мэт"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border)">
    <button class="bgh" onclick="closeModal()">Болих</button>
    <button class="bpri" onclick="saveAddCost()"><i class="ti ti-check" style="font-size:12px"></i> Хадгалах</button>
  </div>`);
}
function saveAddCost(){
  const tid=parseInt(document.getElementById('ac-task').value);
  const amt=parseInt(document.getElementById('ac-amt').value)||0;
  const d2=d();
  const t=d2.tasks.find(x=>x.id===tid);
  if(t){t.cost+=amt;save();closeModal();rPage(curPage);toast('Зардал нэмэгдлээ: '+fmtFull(amt));}
}

function openEmpEdit(){
  const d2=d();
  openModal(`<div class="mh"><span class="mt2"><i class="ti ti-users" style="font-size:13px;vertical-align:-1px;margin-right:5px"></i>Инженерийн нэр засах</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  ${d2.engineers.map((e,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
    <div class="av" style="background:${e.av};color:${e.at};width:30px;height:30px">${e.name.charAt(0)}</div>
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:7px">
      <input class="fi2" id="en-nm-${i}" value="${e.name}" placeholder="Нэр">
      <input class="fi2" id="en-ph-${i}" value="${e.phone}" placeholder="Утас">
      <input class="fi2" id="en-sp-${i}" value="${e.spec}" placeholder="Мэргэшил" style="grid-column:span 2">
    </div>
  </div>`).join('')}
  <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);margin-top:6px">
    <button class="bgh" onclick="closeModal()">Болих</button>
    <button class="bpri" onclick="saveEmps()"><i class="ti ti-check" style="font-size:12px"></i> Хадгалах</button>
  </div>`);
}
function saveEmps(){
  const d2=d();
  d2.engineers.forEach((e,i)=>{
    const n=document.getElementById('en-nm-'+i),p=document.getElementById('en-ph-'+i),s=document.getElementById('en-sp-'+i);
    if(n)e.name=n.value;if(p)e.phone=p.value;if(s)e.spec=s.value;
  });
  save();closeModal();rPage(curPage);toast('Инженерийн мэдээлэл хадгалагдлаа!');
}

function openEqDetail(eid){

  const e=d2.equip.find(x=>x.id===eid);if(!e)return;
  const relTasks=d2.tasks.filter(t=>t.equip.includes(eid));
  openModal(`<div class="mh"><span class="mt2"><i class="ti ${e.icon}" style="font-size:13px;vertical-align:-1px;margin-right:5px"></i>${e.name} — ${e.id}</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12.5px;margin-bottom:13px">
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Үйлдвэрлэгч / Загвар</div><div style="font-weight:700">${e.brand} ${e.model}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Байршил</div><div style="font-weight:700">${e.loc}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Байдал</div><div><span class="sb2 ${EQS[e.status]}"><span class="dot"></span>${e.status}</span></div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Ажилласан цаг</div><div style="font-weight:700">${e.hours.toLocaleString()} цаг</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Сүүлийн ТО</div><div style="font-weight:700">${e.last}</div></div>
    <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Дараагийн ТО</div><div style="font-weight:700">${e.next}</div></div>
  </div>
  ${relTasks.length>0?`<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:7px">Холбоотой ажлууд (${relTasks.length})</div>
  ${relTasks.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
    <span class="bdg ${PC[t.pri]}">${PL[t.pri]}</span>
    <span style="flex:1">${t.name}</span>
    <span class="sb2 ${SC[t.status]}" style="font-size:10px"><span class="dot"></span>${SL[t.status]}</span>
  </div>`).join('')}`:''}
  <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);margin-top:8px">
    <button class="bgh" onclick="closeModal();openQR('${e.id}')">QR код харах</button>
    <button class="bpri" onclick="closeModal()">Хаах</button>
  </div>`);
}

function openQR(eid){
  const d2=d(); const e=d2.equip.find(x=>x.id===eid);if(!e)return;
  // Generate simple QR-like pattern for display
  const seed=eid.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  let cells='';
  for(let r=0;r<21;r++){for(let cl2=0;cl2<21;cl2++){
    const corner=(r<3&&cl2<3)||(r<3&&cl2>17)||(r>17&&cl2<3);
    const edge=(r<=3&&cl2<=3)||(r<=3&&cl2>=17)||(r>=17&&cl2<=3);
    const on=corner||(Math.sin(seed+r*7+cl2*13)*100%2>0);
    cells+=`<div style="width:6px;height:6px;background:${on?'#1A2332':'#fff'};border-radius:${corner?'1px':'0'}"></div>`;
  }}
  openModal(`<div class="mh"><span class="mt2"><i class="ti ti-qrcode" style="font-size:13px;vertical-align:-1px;margin-right:5px"></i>QR код — ${e.name}</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div style="text-align:center;padding:10px 0">
    <div style="display:inline-grid;grid-template-columns:repeat(21,6px);gap:1px;background:#fff;padding:12px;border:2px solid var(--border);border-radius:var(--rm);margin-bottom:12px">${cells}</div>
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px">${e.name} — ${e.id}</div>
    <div style="font-size:11.5px;color:var(--text2)">${e.brand} ${e.model} · ${e.loc}</div>
    <div style="margin-top:12px;font-size:11.5px;color:var(--text2);background:var(--bg3);border-radius:var(--rm);padding:8px">Энэ QR кодыг скан хийснээр тоног төхөөрөмжийн бүрэн мэдээлэл харагдана</div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border)">
    <button class="bpri" onclick="window.print()"><i class="ti ti-printer" style="font-size:12px"></i> Хэвлэх</button>
    <button class="bgh" onclick="closeModal()">Хаах</button>
  </div>`);
}

// ========== NOTIFICATIONS ==========
function toggleNotif(){
  notifOpen=!notifOpen;
  const panel=document.getElementById('notif-panel');
  panel.classList.toggle('op',notifOpen);
  if(notifOpen){
    const d2=d();
    document.getElementById('nph').textContent=`Мэдэгдэлүүд (${d2.notifications.length})`;
    document.getElementById('nlist').innerHTML=d2.notifications.map(n=>`
      <div class="npi"><div class="npic" style="background:${n.ic};color:${n.it}"><i class="ti ${n.icon}"></i></div>
      <div><div class="nptt">${n.title}</div><div class="npds">${n.desc}</div><div class="nptm">${n.time}</div></div></div>`).join('')
      ||`<div style="padding:18px;text-align:center;color:var(--text3);font-size:12px">Мэдэгдэл байхгүй</div>`;
  }
}

// ========== SEARCH ==========
function doSearch(q){
  if(!q.trim()){rPage(curPage);return;}
  const d2=d();
  const ql=q.toLowerCase();
  const found=d2.tasks.filter(t=>t.name.toLowerCase().includes(ql)||t.equip.toLowerCase().includes(ql)||t.eng.toLowerCase().includes(ql)||t.site.toLowerCase().includes(ql));
  const c=document.getElementById('content');
  c.classList.remove('fi');void c.offsetWidth;c.classList.add('fi');
  c.innerHTML=`<div style="margin-bottom:8px;font-size:12.5px;color:var(--text2)"><i class="ti ti-search" style="font-size:13px;vertical-align:-1px"></i> "${q}" — ${found.length} үр дүн</div>${tTable(found)}`;
}

// ========== INIT ==========
updBadges();
rPage('dashboard');
</script>
